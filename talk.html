<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회화 연습 | 상황별 영어 표현</title>
<meta name="description" content="상황별 영어 회화 표현을 카드로 익히고, 표현 고르기·대화 완성 퀴즈로 연습하세요.">
<style>
  :root{
    --bg:#f7f8fa; --card:#ffffff; --card2:#f1f5f9;
    --accent:#2563eb; --accent2:#4f46e5;
    --good:#16a34a; --bad:#dc2626; --text:#1f2937; --muted:#6b7280;
    --border:#e5e7eb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:"Noto Sans KR","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
  .wrap{max-width:660px;margin:0 auto}
  header{text-align:center;padding:18px 0 6px}
  header h1{margin:0;font-size:26px;letter-spacing:-.5px}
  header h1 span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{margin:6px 0 0;color:var(--muted);font-size:14px}
  .back{display:inline-block;margin:6px 0 14px;color:var(--muted);text-decoration:none;font-size:14px}
  .back:hover{color:var(--accent)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 4px 20px rgba(15,23,42,.06)}
  .btn{display:block;width:100%;border:0;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s;color:#fff}
  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .btn-primary:hover{filter:brightness(1.06)}
  .btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
  .btn:active{transform:scale(.98)}
  .hide{display:none}

  .opt-group h3{margin:0 0 10px;font-size:14px;color:var(--muted);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .chip{background:var(--card2);border:1.5px solid var(--border);border-radius:99px;padding:8px 14px;font-size:13.5px;cursor:pointer;transition:.12s}
  .chip:hover{border-color:var(--accent)}
  .chip.active{border-color:var(--accent);background:rgba(37,99,235,.08);color:var(--accent);font-weight:700}

  /* 퀴즈 */
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;color:var(--muted)}
  .progress{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:20px}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s}
  .qtype{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px;text-align:center}
  .q-situation{font-size:14px;color:var(--muted);text-align:center;margin-bottom:6px}
  .q-main{font-size:23px;font-weight:800;text-align:center;margin:4px 0 8px;line-height:1.4;word-break:keep-all}
  .q-main .speaker{display:inline-block;font-size:12px;font-weight:700;color:#fff;background:var(--accent);border-radius:6px;padding:1px 7px;margin-right:6px;vertical-align:middle}
  .q-ko{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px}
  .choices{display:grid;gap:12px}
  .choice{background:var(--card2);border:2px solid var(--border);border-radius:12px;padding:15px;font-size:15.5px;cursor:pointer;transition:.1s;text-align:left;line-height:1.4}
  .choice:hover{border-color:var(--accent)}
  .choice.correct{border-color:var(--good);background:rgba(22,163,74,.12)}
  .choice.wrong{border-color:var(--bad);background:rgba(220,38,38,.12)}
  .choice.disabled{pointer-events:none}
  .choice.disabled:not(.correct):not(.wrong){opacity:.5}
  .feedback{margin-top:18px;text-align:center;min-height:24px;font-weight:700}
  .feedback.good{color:var(--good)}
  .feedback.bad{color:var(--bad)}
  .feedback .ko{display:block;color:var(--muted);font-weight:400;font-size:14px;margin-top:6px}
  .next-wrap{margin-top:16px}

  /* 표현 카드 (쇼츠형) */
  #cardview{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;overflow:hidden;touch-action:none}
  #cardview.on{display:block}
  .cv-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:16px 18px;z-index:3;font-size:14px;color:var(--muted)}
  .cv-top button{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 14px;font-size:14px;cursor:pointer}
  .cv-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:26px}
  .cv-card{width:100%;max-width:580px;text-align:center}
  .cv-tag{display:inline-block;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2));padding:5px 14px;border-radius:99px;margin-bottom:26px}
  .cv-en{font-size:32px;font-weight:900;letter-spacing:-.5px;line-height:1.3;word-break:keep-all}
  .cv-divider{width:60px;height:3px;background:var(--border);border-radius:99px;margin:24px auto}
  .cv-ko{font-size:22px;font-weight:700;color:var(--accent);line-height:1.4}
  .cv-speak{margin-top:26px;background:rgba(37,99,235,.08);border:1px solid var(--accent);color:var(--accent);border-radius:12px;padding:10px 20px;font-size:15px;cursor:pointer}
  .cv-hint{position:absolute;bottom:26px;left:0;right:0;text-align:center;color:var(--muted);font-size:13px;animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.65}50%{transform:translateY(-6px);opacity:1}}
  .cv-progress{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:4;transition:width .3s}
  .sc-in-up{animation:scInUp .35s cubic-bezier(.22,1,.36,1)}
  .sc-in-down{animation:scInDown .35s cubic-bezier(.22,1,.36,1)}
  @keyframes scInUp{from{transform:translateY(70%);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes scInDown{from{transform:translateY(-70%);opacity:0}to{transform:translateY(0);opacity:1}}

  /* 결과 */
  .result-big{font-size:48px;font-weight:900;text-align:center;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .result-sub{text-align:center;color:var(--muted);margin:6px 0 16px}
  .review-item{padding:10px 4px;border-bottom:1px solid var(--border);font-size:14px}
  .review-item .e{font-weight:700}
  .review-item .k{color:var(--muted);font-size:13px}
  .row{display:flex;gap:12px;margin-top:14px}
  .row .btn{margin:0}
  #toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);background:#1f2937;color:#fff;padding:12px 22px;border-radius:99px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:.3s;z-index:100}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span>💬 회화 연습</span></h1>
    <p>상황별 표현을 익히고 실전처럼 연습해요</p>
  </header>
  <div style="text-align:center"><a class="back" href="index.html">← 영어·맞춤법 학습으로</a></div>

  <!-- 홈 -->
  <section id="home" class="card">
    <div class="opt-group">
      <h3>상황 선택</h3>
      <div class="chips" id="sceneChips"></div>
    </div>
    <button class="btn btn-primary" id="cardBtn">📖 표현 카드 넘겨보기</button>
    <button class="btn btn-ghost" id="quizBtn" style="margin-top:12px">📝 회화 퀴즈 풀기</button>
    <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px;line-height:1.6">
      표현 고르기와 대화 완성이 섞여 나오고,<br>틀린 문제는 끝에 다시 풀어요.
    </p>
    <div style="text-align:center;margin-top:8px;color:var(--muted);font-size:12px" id="homeStat"></div>
  </section>

  <!-- 퀴즈 -->
  <section id="quiz" class="card hide">
    <div class="topbar"><span id="qProgress">1 / 12</span><span id="qScore">정답 0</span></div>
    <div class="progress"><div id="progressBar"></div></div>
    <div class="qtype" id="qType"></div>
    <div class="q-situation" id="qSituation"></div>
    <div class="q-main" id="qMain"></div>
    <div class="q-ko" id="qKo"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="next-wrap hide" id="nextWrap"><button class="btn btn-primary" id="nextBtn">다음 →</button></div>
    <div style="margin-top:14px"><button class="btn btn-ghost" id="quitBtn">그만두기</button></div>
  </section>

  <!-- 결과 -->
  <section id="result" class="card hide">
    <div class="result-big" id="resultScore">0%</div>
    <div class="result-sub" id="resultSub"></div>
    <div id="reviewList"></div>
    <div class="row">
      <button class="btn btn-primary" id="againBtn">한 번 더</button>
      <button class="btn btn-ghost" id="homeBtn">처음으로</button>
    </div>
  </section>

  <!-- 표현 카드 (쇼츠형) -->
  <div id="cardview">
    <div class="cv-progress" id="cvProgress" style="width:0"></div>
    <div class="cv-top"><span id="cvCount">1 / 1</span><button id="cvClose">✕ 닫기</button></div>
    <div class="cv-stage"><div class="cv-card" id="cvCard"></div></div>
    <div class="cv-hint" id="cvHint">⬆ 위로 스와이프 · 클릭 · ↑↓ 키로 넘기기</div>
  </div>

  <div id="toast"></div>
  <footer>표현은 소리 내어 따라 말해 보면 훨씬 빨리 늘어요 🗣️</footer>
</div>

<script src="data-talk.js"></script>
<script>
const PHRASES = window.PHRASES||[], DIALOGS = window.DIALOGS||[], SCENES = window.SCENES||{};
const $ = id => document.getElementById(id);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const shuffle = a => a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);

let scene = "all";
let toastTimer=null;
function showToast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

function speak(text){
  try{ const u=new SpeechSynthesisUtterance(text); u.lang="en-US"; u.rate=.92; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){}
}

/* 상황 칩 */
(function buildChips(){
  const wrap=$("sceneChips");
  const add=(key,label)=>{ const c=el("div","chip"+(key==="all"?" active":""),label); c.dataset.k=key; c.onclick=()=>{ wrap.querySelectorAll(".chip").forEach(x=>x.classList.remove("active")); c.classList.add("active"); scene=key; updateStat(); }; wrap.appendChild(c); };
  add("all","전체");
  Object.keys(SCENES).forEach(k=>add(k,SCENES[k]));
})();
function phrasesFor(s){ return s==="all"?PHRASES:PHRASES.filter(p=>p.scene===s); }
function dialogsFor(s){ const d=s==="all"?DIALOGS:DIALOGS.filter(x=>x.scene===s); return d.length>=4?d:DIALOGS; }
function updateStat(){ $("homeStat").textContent = `표현 ${phrasesFor(scene).length}개 · 대화 ${(scene==="all"?DIALOGS:DIALOGS.filter(x=>x.scene===scene)).length}개`; }
updateStat();

/* ===== 회화 퀴즈 ===== */
let queue=[], retry=[], idx=0, score=0, totalDone=0, wrongs=[], current=null;

function buildQueue(){
  const ps = shuffle(phrasesFor(scene)).map(p=>({type:"A", p}));
  const ds = shuffle(dialogsFor(scene)).map(d=>({type:"B", d}));
  // 표현 고르기와 대화 완성을 적절히 섞기
  let pool = shuffle([...ps, ...ds.slice(0, Math.max(4, Math.floor(ps.length*0.5)))]);
  return pool.slice(0, Math.min(12, pool.length));
}
function distinctChoices(correct, pool, key, n){
  const seen=new Set([correct]); const out=[correct];
  for(const x of shuffle(pool)){ const v=x[key]; if(seen.has(v))continue; seen.add(v); out.push(v); if(out.length>=n+1)break; }
  return shuffle(out);
}

function show(sec){ ["home","quiz","result"].forEach(s=>$(s).classList.toggle("hide", s!==sec)); }

function startQuiz(){
  queue=buildQueue(); retry=[]; idx=0; score=0; totalDone=0; wrongs=[];
  if(queue.length===0){ showToast("이 상황에는 표현이 부족해요"); return; }
  show("quiz"); renderQ();
}

function renderQ(){
  const item=queue[idx];
  $("qProgress").textContent=`${idx+1} / ${queue.length}`;
  $("qScore").textContent=`정답 ${score}`;
  $("progressBar").style.width=(idx/queue.length*100)+"%";
  $("feedback").textContent=""; $("feedback").className="feedback";
  $("nextWrap").classList.add("hide");
  $("qSituation").textContent=""; $("qMain").innerHTML=""; $("qKo").textContent="";
  $("choices").innerHTML="";

  let correctVal, choices, speakText;
  if(item.type==="A"){
    const p=item.p;
    $("qType").textContent="🗨️ 이 상황, 영어로?";
    $("qSituation").textContent="["+SCENES[p.scene]+"]";
    $("qMain").textContent=p.ko;
    correctVal=p.en; speakText=p.en;
    choices=distinctChoices(p.en, PHRASES, "en", 3);
  } else {
    const d=item.d;
    $("qType").textContent="💬 알맞은 응답은?";
    $("qSituation").textContent="["+SCENES[d.scene]+"]";
    $("qMain").innerHTML=`<span class="speaker">상대</span>${d.a}`;
    $("qKo").textContent="("+d.ko.split("→")[0].trim()+")";
    correctVal=d.b; speakText=d.b;
    choices=distinctChoices(d.b, DIALOGS, "b", 3);
  }
  current={item, correctVal, speakText, answered:false};

  choices.forEach(ch=>{
    const b=el("div","choice",ch);
    b.onclick=()=>answer(b,ch);
    $("choices").appendChild(b);
  });
}

function answer(elm, chosen){
  if(current.answered) return;
  current.answered=true; totalDone++;
  const ok = chosen===current.correctVal;
  $("choices").querySelectorAll(".choice").forEach(c=>{
    c.classList.add("disabled");
    if(c.textContent===current.correctVal) c.classList.add("correct");
  });
  if(!ok) elm.classList.add("wrong");
  const fb=$("feedback");
  const koLine = current.item.type==="A" ? current.item.p.ko : current.item.d.ko;
  if(ok){ score++; fb.innerHTML=`정답이에요! 🎉<span class="ko">${koLine}</span>`; fb.className="feedback good"; }
  else { fb.innerHTML=`아쉬워요! 정답: <b>${current.correctVal}</b><span class="ko">${koLine}</span>`; fb.className="feedback bad"; if(!retry.includes(current.item))retry.push(current.item); wrongs.push(current.item); }
  $("qScore").textContent=`정답 ${score}`;
  speak(current.speakText);
  $("nextWrap").classList.remove("hide");
}

$("nextBtn").onclick=()=>{
  idx++;
  if(idx>=queue.length){
    if(retry.length>0){ queue=shuffle(retry); retry=[]; idx=0; showToast("📌 틀린 표현 "+queue.length+"개 복습!"); renderQ(); }
    else finish();
  } else renderQ();
};
$("quitBtn").onclick=()=>{ if(confirm("그만둘까요?")) finish(); };

function finish(){
  show("result");
  const pct=totalDone>0?Math.round(score/totalDone*100):0;
  $("resultScore").textContent=pct+"%";
  $("resultSub").textContent=`${totalDone}문제 중 ${score}문제 정답`;
  const seen=new Set(), uniq=[];
  wrongs.forEach(it=>{ const k=it.type==="A"?it.p.en:it.d.b; if(!seen.has(k)){seen.add(k); uniq.push(it);} });
  const rl=$("reviewList");
  if(uniq.length===0){ rl.innerHTML=`<div style="text-align:center;padding:18px;color:var(--good);font-weight:700">완벽해요! 👏</div>`; }
  else{
    rl.innerHTML=`<h3 style="font-size:14px;color:var(--muted);margin:0 0 6px">복습할 표현 (${uniq.length})</h3>`+
      uniq.map(it=>{ const e=it.type==="A"?it.p.en:it.d.b; const k=it.type==="A"?it.p.ko:it.d.ko; return `<div class="review-item"><div class="e">${e}</div><div class="k">${k}</div></div>`; }).join("");
  }
}
$("quizBtn").onclick=startQuiz;
$("againBtn").onclick=startQuiz;
$("homeBtn").onclick=()=>show("home");

/* ===== 표현 카드 (쇼츠형) ===== */
let cvDeck=[], cvIdx=0, cvActive=false;
function openCards(){
  cvDeck=shuffle(phrasesFor(scene));
  if(cvDeck.length===0){ showToast("이 상황에는 표현이 부족해요"); return; }
  cvIdx=0; cvActive=true; $("cvHint").style.display="";
  $("cardview").classList.add("on"); renderCard("up");
}
function closeCards(){ cvActive=false; $("cardview").classList.remove("on"); try{speechSynthesis.cancel();}catch(e){} }
function renderCard(dir){
  const p=cvDeck[cvIdx];
  $("cvCount").textContent=`${cvIdx+1} / ${cvDeck.length}`;
  $("cvProgress").style.width=((cvIdx+1)/cvDeck.length*100)+"%";
  const card=$("cvCard");
  card.className="cv-card "+(dir==="down"?"sc-in-down":"sc-in-up");
  card.innerHTML=`<span class="cv-tag">${SCENES[p.scene]}</span>
    <div class="cv-en">${p.en}</div><div class="cv-divider"></div>
    <div class="cv-ko">${p.ko}</div>
    <div><button class="cv-speak" id="cvSpeak">🔊 발음 듣기</button></div>`;
  void card.offsetWidth;
  const sb=$("cvSpeak"); if(sb) sb.onclick=(e)=>{ e.stopPropagation(); speak(p.en); };
  speak(p.en);
}
function cvMove(step){
  const n=cvDeck.length; if(n===0)return;
  cvIdx=(cvIdx+step+n)%n; renderCard(step<0?"down":"up");
  if(cvIdx>=4) $("cvHint").style.display="none";
}
$("cardBtn").onclick=openCards;
$("cvClose").onclick=closeCards;
$("cardview").addEventListener("click",(e)=>{ if(e.target.closest(".cv-top")||e.target.closest(".cv-speak"))return; cvMove(1); });
document.addEventListener("keydown",(e)=>{
  if(!cvActive)return;
  if(["ArrowDown","ArrowRight"," ","Enter"].includes(e.key)){ e.preventDefault(); cvMove(1); }
  else if(["ArrowUp","ArrowLeft"].includes(e.key)){ e.preventDefault(); cvMove(-1); }
  else if(e.key==="Escape") closeCards();
});
let cvWheelLock=false;
$("cardview").addEventListener("wheel",(e)=>{ if(!cvActive)return; e.preventDefault(); if(cvWheelLock||Math.abs(e.deltaY)<8)return; cvWheelLock=true; cvMove(e.deltaY>0?1:-1); setTimeout(()=>cvWheelLock=false,350); },{passive:false});
let cvTouchY=null;
$("cardview").addEventListener("touchstart",(e)=>{ cvTouchY=e.touches[0].clientY; },{passive:true});
$("cardview").addEventListener("touchend",(e)=>{
  if(cvTouchY===null)return; const dy=e.changedTouches[0].clientY-cvTouchY; cvTouchY=null;
  if(Math.abs(dy)<40){ if(!e.target.closest(".cv-top")&&!e.target.closest(".cv-speak")) cvMove(1); return; }
  cvMove(dy<0?1:-1);
},{passive:true});
</script>
</body>
</html>
